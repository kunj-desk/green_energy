<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoEnergy | Contact</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

<!-- Navigation Bar -->
<header class="sticky"> 
  <div class="container">
    <input type="checkbox" id="nav-toggle">
    <div class="logo"><a href="#"><img src="images/logo.png" alt=""></a></div>
    <ul class="links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#Project">Project</a></li>
      <li><a href="index.html#ourservices">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <label for="nav-toggle" class="icon-burger">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </label>
  </div>
</header>

<!-- Contact Section -->
<section class="eco-contact">
  <div class="eco-contact-container">
    <h1>Contact Us</h1>
    <div class="eco-contact-row">
      <div class="eco-contact-left">
        <h2>Get in Touch</h2>
        <p class="eco-contact-info">You can reach out to us with any queries or project discussions using the form.</p>
        <p class="eco-contact-info">Email: <strong>ecoenergy@example.com</strong></p>
        <p class="eco-contact-info">Phone: <strong>+1 234 567 8900</strong></p>
      </div>
      <div class="eco-contact-right">
        <form id="eco-contact-form">
          <div class="eco-form-group">
            <label for="fname">First Name*</label>
            <input type="text" id="fname" name="fname" />
          </div>
          <div class="eco-form-group">
            <label for="lname">Last Name*</label>
            <input type="text" id="lname" name="lname" />
          </div>
          <div class="eco-form-group">
            <label for="email">Email*</label>
            <input type="email" id="email" name="email" />
          </div>
          <div class="eco-form-group">
            <label for="phone">Phone*</label>
            <input type="tel" id="phone" name="phone" />
          </div>
          <div class="eco-form-group">
            <label for="message">Message*</label>
            <textarea id="message" rows="4" name="message"></textarea>
          </div>
          <button type="submit" class="eco-contact-btn">Submit</button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- JavaScript for Form Validation -->
<script>
  document.getElementById('eco-contact-form').addEventListener('submit', function(event) {
    event.preventDefault();

    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const message = document.getElementById('message').value.trim();

    const nameRegex = /^[A-Za-z]+$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // fixed
    const phoneRegex = /^\d{10}$/; // fixed

    if (!fname || !nameRegex.test(fname)) {
      alert("Please enter a valid First Name (letters only).");
      return;
    }

    if (!lname || !nameRegex.test(lname)) {
      alert("Please enter a valid Last Name (letters only).");
      return;
    }

    if (!email || !emailRegex.test(email)) {
      alert("Please enter a valid Email address.");
      return;
    }

    if (!phone || !phoneRegex.test(phone)) {
      alert("Please enter a valid 10-digit Phone number.");
      return;
    }

    if (!message || message.length < 10) {
      alert("Message must be at least 10 characters long.");
      return;
    }

    // All fields are valid
    alert(`Thank you, ${fname}! Your message has been submitted successfully.`);
    document.getElementById('eco-contact-form').reset();
  });
</script>

</body>
</html>
